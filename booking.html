<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование | Sibiria Airlines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0a0e17; color: white; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #151a28; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        h2 { margin-bottom: 15px; }
        select, button {
            padding: 12px 20px; border-radius: 8px; border: none;
            font-size: 1em; cursor: pointer; margin: 5px;
        }
        select { background: #1e2538; color: white; width: 100%; }
        button { background: #0066cc; color: white; font-weight: bold; }
        button:disabled { background: #333; cursor: not-allowed; }
        .seats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; max-width: 350px; margin: 20px auto; }
        .seat {
            aspect-ratio: 1; border-radius: 6px; display: flex;
            align-items: center; justify-content: center;
            font-size: 0.7em; cursor: pointer; background: #1e3a5f;
        }
        .seat.booked { background: #661111; cursor: not-allowed; }
        .seat.selected { background: #00aa44; }
        .back { color: #7eb8ff; text-decoration: none; display: inline-block; margin-bottom: 15px; }
        #msg { padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← На главную</a>
        <h2>🛫 Бронирование рейса</h2>
        
        <div class="card">
            <select id="flightSelect" onchange="selectFlight()">
                <option>Загрузка рейсов...</option>
            </select>
        </div>
        
        <div class="card" id="info" style="display:none;">
            <h3 id="ftitle"></h3>
            <p id="froute"></p>
            <p id="ftime"></p>
            <p id="freeseats"></p>
            <h4 style="margin-top:15px;">Выберите место:</h4>
            <div class="seats" id="seatMap"></div>
            <p id="selinfo" style="text-align:center;">Место не выбрано</p>
            <button id="bookBtn" disabled onclick="book()">Забронировать</button>
            <div id="msg"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const supabase = createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        
        let flightId = null;
        let selectedSeat = null;
        
        async function loadFlights() {
            const { data } = await supabase.from('flights').select('*').eq('status', 'scheduled');
            const sel = document.getElementById('flightSelect');
            if (!data || data.length === 0) {
                sel.innerHTML = '<option>Нет доступных рейсов</option>';
                return;
            }
            sel.innerHTML = '<option value="">-- Выберите рейс --</option>';
            data.forEach(f => {
                sel.innerHTML += `<option value="${f.id}">${f.flight_number} | ${f.departure} → ${f.arrival}</option>`;
            });
        }
        
        window.selectFlight = async function() {
            const id = document.getElementById('flightSelect').value;
            if (!id) { document.getElementById('info').style.display = 'none'; return; }
            flightId = id;
            
            const { data: f } = await supabase.from('flights').select('*').eq('id', id).single();
            if (!f) return;
            
            document.getElementById('info').style.display = 'block';
            document.getElementById('ftitle').textContent = f.flight_number;
            document.getElementById('froute').textContent = f.departure + ' → ' + f.arrival;
            document.getElementById('ftime').textContent = 'Вылет: ' + new Date(f.departure_time).toLocaleString();
            
            const { data: booked } = await supabase.from('bookings').select('seat_number').eq('flight_id', id);
            const bookedSet = new Set(booked ? booked.map(b => b.seat_number) : []);
            
            document.getElementById('freeseats').textContent = 'Свободно: ' + (242 - bookedSet.size) + ' из 242';
            
            const map = document.getElementById('seatMap');
            map.innerHTML = '';
            for (let row = 1; row <= 41; row++) {
                for (let col of ['A','B','C','D','E','F']) {
                    if (row === 41 && col > 'B') break;
                    const seatNum = row + col;
                    const div = document.createElement('div');
                    div.className = 'seat';
                    div.textContent = seatNum;
                    if (bookedSet.has(seatNum)) {
                        div.classList.add('booked');
                    } else {
                        div.onclick = () => {
                            document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
                            div.classList.add('selected');
                            selectedSeat = seatNum;
                            document.getElementById('selinfo').textContent = 'Выбрано: ' + seatNum;
                            document.getElementById('bookBtn').disabled = false;
                        };
                    }
                    map.appendChild(div);
                }
            }
        };
        
        window.book = async function() {
            if (!flightId || !selectedSeat) return;
            const name = prompt('Ваш ник в Roblox:') || 'Пилот';
            const { error } = await supabase.from('bookings').insert({
                flight_id: flightId, seat_number: selectedSeat, passenger_name: name
            });
            const msg = document.getElementById('msg');
            if (error) {
                msg.style.background = '#661111';
                msg.textContent = 'Ошибка: ' + error.message;
            } else {
                msg.style.background = '#116633';
                msg.textContent = 'Место ' + selectedSeat + ' забронировано!';
                document.getElementById('bookBtn').disabled = true;
                selectedSeat = null;
                selectFlight();
            }
        };
        
        loadFlights();
    </script>
</body>
</html>
