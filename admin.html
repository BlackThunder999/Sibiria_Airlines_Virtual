<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Sibiria Airlines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0a0e17; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #151a28; border-radius: 15px; padding: 30px; max-width: 400px; width: 100%; text-align: center; }
        h2 { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1e2538; color: white; margin-bottom: 15px; font-size: 1em; }
        button { padding: 14px 30px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 1.05em; margin: 8px 0; width: 100%; }
        .btn-login { background: #0066cc; }
        .btn-crash { background: #cc0000; }
        .btn-land { background: #00aa44; }
        .btn-back { background: #2a3a5e; }
        .stats { margin: 20px 0; font-size: 1.2em; }
        #error { color: #ff4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card" id="loginBox">
        <h2>⚙️ Админ-панель</h2>
        <input type="password" id="passInput" placeholder="Пароль">
        <button class="btn-login" onclick="login()">Войти</button>
        <p id="error"></p>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>
    
    <div class="card" id="panel" style="display:none;">
        <h2>⚙️ Управление</h2>
        <div class="stats">
            <p>💥 Катастроф: <b id="crashCount">0</b></p>
            <p>✅ Посадок: <b id="landCount">0</b></p>
        </div>
        <button class="btn-crash" onclick="add('crashes')">💥 +1 Катастрофа</button>
        <button class="btn-land" onclick="add('successful_landings')">✅ +1 Посадка</button>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const supabase = createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        
        window.login = function() {
            if (document.getElementById('passInput').value === 'Sibiria2026') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadStats();
            } else {
                document.getElementById('error').textContent = 'Неверный пароль!';
            }
        };
        
        async function loadStats() {
            const { data } = await supabase.from('stats').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('crashCount').textContent = data.crashes;
                document.getElementById('landCount').textContent = data.successful_landings;
            }
        }
        
        window.add = async function(field) {
            const { data } = await supabase.from('stats').select(field).eq('id', 1).single();
            const newVal = (data?.[field] || 0) + 1;
            await supabase.from('stats').update({ [field]: newVal }).eq('id', 1);
            loadStats();
        };
    </script>
</body>
</html>
